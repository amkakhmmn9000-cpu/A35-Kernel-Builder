name: Build Kernel A35 (KernelSU)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04 # نسخة مستقرة لأدوات البناء
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld curl wget git zip
          # تحميل Toolchain (Clang) المناسب لسامسونج
          git clone --depth=1 https://github.com/LineageOS/android_prebuilts_clang_kernel_linux-x86_clang-r487703 ./clang

      - name: Download and Sync Source
        run: |
          # هنا يجب وضع رابط السورس. سأضع لك مثالاً لرابط سورس A35 أندرويد 15 إذا كان متاحاً
          # أو يمكنك رفع ملف SM-A356E.zip إلى مستودع منفصل واستخدامه هنا
          echo "جاري تجهيز السورس كود..."
          # wget "رابط_تحميل_السورس" -O kernel_source.zip
          # unzip kernel_source.zip -d kernel_root

      - name: Setup KernelSU
        run: |
          cd kernel_root
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          # تفعيل الإعدادات في ملف الـ defconfig الخاص بـ Exynos 1380
          echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos1380_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/exynos1380_defconfig
          echo "CONFIG_KPROBES=y" >> arch/arm64/configs/exynos1380_defconfig

      - name: Build Kernel
        run: |
          export PATH=$(pwd)/clang/bin:$PATH
          cd kernel_root
          make O=out ARCH=arm64 exynos1380_defconfig
          make O=out ARCH=arm64 \
          CC=clang \
          CLANG_TRIPLE=aarch64-linux-gnu- \
          CROSS_COMPILE=aarch64-linux-android- \
          -j$(nproc)

      - name: Upload Kernel Image
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_A35_KSU
          path: kernel_root/out/arch/arm64/boot/Image
