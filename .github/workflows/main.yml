name: A35 Kernel Builder (Direct Sync)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bc build-essential flex bison libssl-dev libelf-dev clang llvm lld curl wget git zip

      - name: Sync Source (Direct from Server)
        run: |
          # هنا السحر: الـ Workflow هيحمل السورس كود بنفسه بسرعة البرق
          # سأضع لك الرابط المباشر لسورس A356E (أندرويد 15)
          wget "https://opensource.samsung.com/uploadSearch?isSearch=true&searchText=SM-A356E" -O source_page.html
          # (هنا بنحط الرابط الحقيقي اللي هجيبهولك حالاً)
          # curl -L "رابط_السورس_المباشر" -o kernel.zip
          # unzip kernel.zip -d kernel_root

      - name: Integrate KernelSU
        run: |
          cd kernel_root
          # دمج KernelSU أوتوماتيكياً
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          # تفعيل الإعدادات
          echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos1380_defconfig
          echo "CONFIG_OVERLAY_FS=y" >> arch/arm64/configs/exynos1380_defconfig

      - name: Build Kernel
        run: |
          # أوامر البناء النهائية
          cd kernel_root
          make O=out ARCH=arm64 exynos1380_defconfig
          make O=out ARCH=arm64 CC=clang -j$(nproc)

      - name: Upload Finished Boot Image
        uses: actions/upload-artifact@v4
        with:
          name: Boot_With_KernelSU
          path: kernel_root/out/arch/arm64/boot/Image.gz
